name: NAR 予想生成・通知（毎日）

on:
  schedule:
    - cron: '0 0 * * 0-2,4-6'  # 水曜以外 09:00 JST — 予想生成
    - cron: '0 2 * * 3'        # 水曜のみ 11:00 JST — 予想生成（update完了後）
    - cron: '0 5 * * *'   # 毎日 14:00 JST — 通知
  workflow_dispatch:
    inputs:
      mode:
        description: 'predict=予想生成のみ / notify=通知のみ / both=両方'
        required: false
        default: 'both'

permissions:
  contents: write

env:
  DISCORD_WEBHOOK_URL:              ${{ secrets.DISCORD_WEBHOOK_URL }}
  DISCORD_NAR_OI_WEBHOOK_URL:       ${{ secrets.DISCORD_NAR_OI_WEBHOOK_URL }}
  DISCORD_NAR_FUNABASHI_WEBHOOK_URL: ${{ secrets.DISCORD_NAR_FUNABASHI_WEBHOOK_URL }}
  DISCORD_NAR_KAWASAKI_WEBHOOK_URL:  ${{ secrets.DISCORD_NAR_KAWASAKI_WEBHOOK_URL }}
  DISCORD_NAR_URAWA_WEBHOOK_URL:    ${{ secrets.DISCORD_NAR_URAWA_WEBHOOK_URL }}
  DISCORD_NAR_MONBETSU_WEBHOOK_URL: ${{ secrets.DISCORD_NAR_MONBETSU_WEBHOOK_URL }}
  DISCORD_NAR_NAGOYA_WEBHOOK_URL:  ${{ secrets.DISCORD_NAR_NAGOYA_WEBHOOK_URL }}
  DISCORD_NAR_KOCHI_WEBHOOK_URL:   ${{ secrets.DISCORD_NAR_KOCHI_WEBHOOK_URL }}
  DISCORD_NAR_SAGA_WEBHOOK_URL:    ${{ secrets.DISCORD_NAR_SAGA_WEBHOOK_URL }}
  DISCORD_REPORT_WEBHOOK_URL: ${{ secrets.DISCORD_REPORT_WEBHOOK_URL }}
  ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
  TWITTER_API_KEY:             ${{ secrets.TWITTER_API_KEY }}
  TWITTER_API_SECRET:          ${{ secrets.TWITTER_API_SECRET }}
  TWITTER_ACCESS_TOKEN:        ${{ secrets.TWITTER_ACCESS_TOKEN }}
  TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
  ENABLE_X_POST: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 最新コミットをプル
        run: git pull --ff-only origin ${{ github.ref_name }} || true

      - name: 実行モードを判定
        id: mode
        run: |
          HOUR=$(date -u +%H)
          INPUT_MODE="${{ inputs.mode }}"
          if [ -n "$INPUT_MODE" ] && [ "$INPUT_MODE" != "" ]; then
            echo "mode=$INPUT_MODE" >> $GITHUB_OUTPUT
            echo "📋 手動実行モード: $INPUT_MODE"
          elif [ "$HOUR" -lt 4 ]; then
            echo "mode=predict" >> $GITHUB_OUTPUT
            echo "📋 スケジュール: 予想生成モード (UTC $HOUR時)"
          else
            echo "mode=notify" >> $GITHUB_OUTPUT
            echo "📋 スケジュール: 通知モード (UTC $HOUR時)"
          fi

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt
          echo "✅ pip install 完了"

      - name: Playwright Chromium キャッシュ
        if: steps.mode.outputs.mode == 'predict' || steps.mode.outputs.mode == 'both'
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Playwright Chromium をインストール
        if: steps.mode.outputs.mode == 'predict' || steps.mode.outputs.mode == 'both'
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            python -m playwright install chromium
          fi
          python -m playwright install-deps chromium

      - name: モデルをGoogle Driveからダウンロード
        continue-on-error: true
        env:
          NAR_MODEL_GDRIVE_ID: ${{ secrets.NAR_MODEL_GDRIVE_ID }}
        run: python keiba_predictor/scripts/download_model.py

      - name: cleaned_races.csv を Google Drive からダウンロード
        continue-on-error: true
        env:
          CLEANED_RACES_GDRIVE_ID: ${{ secrets.CLEANED_RACES_GDRIVE_ID }}
        run: python keiba_predictor/scripts/download_cleaned_races.py

      - name: モデルファイルを確認（バンドモデルにフォールバック）
        run: |
          MODEL_PATH="keiba_predictor/model/xgb_model.pkl"
          if [ -f "$MODEL_PATH" ]; then
            echo "✅ メインモデル確認OK"
          else
            echo "⚠️ メインモデル(xgb_model.pkl)なし → 距離帯別モデルにフォールバック"
            BAND_COUNT=$(ls keiba_predictor/model/xgb_model_*.pkl 2>/dev/null | wc -l)
            if [ "$BAND_COUNT" -gt 0 ]; then
              echo "✅ バンドモデル ${BAND_COUNT} 個利用可能"
            else
              echo "::error::モデルファイルが一切見つかりません"
              exit 1
            fi
          fi

      # ── 予想生成（11時JST） ──────────────────────────────────
      - name: NAR予想を生成（predict_live）
        if: steps.mode.outputs.mode == 'predict' || steps.mode.outputs.mode == 'both'
        continue-on-error: true
        run: |
          echo "🔮 NAR予想生成中（predict_live）..."
          python -c "
          import sys, json, logging
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          from keiba_predictor.discord_notify import _load_cache, scrape_nar_race_ids_for_today
          from keiba_predictor.model.predict import predict_live
          import requests

          from keiba_predictor.discord_notify import _save_cache
          from datetime import date

          session = requests.Session()
          nar_races = scrape_nar_race_ids_for_today(session)
          print(f'今日のNARレース: {len(nar_races)} 件')
          cache = _load_cache()

          # 今日以外のキャッシュを削除（JST基準・日付が変わったら再予想）
          from datetime import datetime, timezone, timedelta
          today_str = (datetime.now(timezone.utc) + timedelta(hours=9)).date().isoformat()
          stale = [k for k, v in cache.items()
                   if not k.startswith('_') and isinstance(v, dict)
                   and v.get('race_date') and v['race_date'] != today_str]
          if stale:
              for k in stale:
                  del cache[k]
              _save_cache(cache)
              print(f'  過去キャッシュ {len(stale)} 件削除')

          for race in nar_races:
              rid = race['race_id']
              name = race.get('race_name', rid)
              if cache.get(rid, {}).get('predicted_top3_nums'):
                  print(f'  キャッシュ済みスキップ: {name}')
                  continue
              try:
                  print(f'  NAR予想生成: {name} ({rid})')
                  predict_live(rid, notify=False, is_grade=False)
              except Exception as e:
                  print(f'  失敗: {name}: {e}')
          print('NAR予想生成完了')
          "
          echo "✅ NAR予想生成完了"

      - name: 予想キャッシュをコミット・プッシュ
        if: steps.mode.outputs.mode == 'predict' || steps.mode.outputs.mode == 'both'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config rebase.autoStash true
          # 解凍済みCSVは追跡対象外なので削除して unstaged 化を回避
          rm -f keiba_predictor/data/cleaned_races.csv
          git add keiba_predictor/data/predictions_cache.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "ℹ️ 変更なし"
          else
            git commit -m "chore: NAR予想キャッシュ更新 [skip ci]"
            for i in 1 2 3; do
              git stash -u || true
              git pull --rebase --autostash origin ${{ github.ref_name }} && git push && { git stash pop || true; break; }
              git stash pop || true
              echo "push retry $i"
              sleep 3
            done
            echo "✅ コミット・プッシュ完了"
          fi

      # ── 通知（14時JST） ──────────────────────────────────────
      - name: Discord にNAR予想を送信
        if: steps.mode.outputs.mode == 'notify' || steps.mode.outputs.mode == 'both'
        continue-on-error: true
        run: |
          echo "📤 NAR予想通知を送信..."
          python -m keiba_predictor.main notify --mode predict
          echo "✅ 通知完了"

      - name: レポートをコミット
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config rebase.autoStash true
          # 解凍済みCSVは追跡対象外なので削除して unstaged 化を回避
          rm -f keiba_predictor/data/cleaned_races.csv
          git add keiba_predictor/data/predictions_cache.json 2>/dev/null || true
          git add keiba_predictor/data/note_report_*.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "ℹ️ 変更なし"
          else
            git commit -m "chore: NAR予想キャッシュ・レポート更新 [skip ci]"
            for i in 1 2 3; do
              git stash -u || true
              git pull --rebase --autostash origin ${{ github.ref_name }} && git push && { git stash pop || true; break; }
              git stash pop || true
              echo "push retry $i"
              sleep 3
            done
          fi

      - name: ❌ エラーを Discord に通知
        if: failure()
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **NAR予想ワークフローが失敗しました**\nログ: ${RUN_URL}\"}" || true
