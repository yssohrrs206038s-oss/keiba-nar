name: NAR 水曜データ更新・モデル再学習

on:
  # スケジュールは外部cron-jobで管理（水曜 10:00）
  workflow_dispatch:

permissions:
  contents: write

env:
  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Discord Webhook URL を確認
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "::error::DISCORD_WEBHOOK_URL が設定されていません。"
            exit 1
          fi
          echo "✅ DISCORD_WEBHOOK_URL: 設定済み"

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージをインストール
        run: |
          pip install -r requirements.txt
          echo "✅ pip install 完了"

      # ── データ収集 ──────────────────────────────────────────
      - name: NARスクレイピング（直近2週間）
        run: |
          TWO_WEEKS_AGO=$(date -d "14 days ago" +%Y-%m 2>/dev/null || \
            python3 -c "from datetime import date,timedelta;print((date.today()-timedelta(days=14)).strftime('%Y-%m'))")
          END=$(date +%Y-%m)
          echo "📅 NAR スクレイピング期間: $TWO_WEEKS_AGO ～ $END"
          python -c "
          import sys, logging
          sys.stdout.reconfigure(encoding='utf-8', errors='replace')
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(levelname)s %(message)s')
          from keiba_predictor.scraper.netkeiba_scraper import scrape_nar_races
          start = '$TWO_WEEKS_AGO'.split('-')
          end = '$END'.split('-')
          df = scrape_nar_races(int(start[0]), int(start[1]), int(end[0]), int(end[1]))
          print(f'NAR取得完了: {len(df)} rows')
          "

      - name: 過去の cleaned_races.csv.gz を解凍（既存データとマージ用）
        run: |
          if [ -f keiba_predictor/data/cleaned_races.csv.gz ]; then
            gunzip -k -f keiba_predictor/data/cleaned_races.csv.gz
            ROWS=$(wc -l < keiba_predictor/data/cleaned_races.csv)
            echo "✅ 過去 cleaned_races.csv 解凍完了: ${ROWS} 行"
          else
            echo "ℹ️ 過去 cleaned_races.csv.gz なし → 新規作成"
          fi

      - name: データクリーニング（過去データとマージ）
        run: |
          if [ ! -f keiba_predictor/data/raw_races.csv ]; then
            echo "⚠️ raw_races.csv が見つかりません → 以降のステップをスキップ"
            echo "DATA_READY=false" >> $GITHUB_ENV
          else
            # 過去 cleaned_races.csv を退避
            if [ -f keiba_predictor/data/cleaned_races.csv ]; then
              mv keiba_predictor/data/cleaned_races.csv keiba_predictor/data/cleaned_races_old.csv
            fi
            python -m keiba_predictor.main clean
            # 新旧をマージ（race_id重複は新しい方を優先）
            if [ -f keiba_predictor/data/cleaned_races_old.csv ]; then
              python -c "
              import pandas as pd
              old = pd.read_csv('keiba_predictor/data/cleaned_races_old.csv', encoding='utf-8-sig', dtype=str)
              new = pd.read_csv('keiba_predictor/data/cleaned_races.csv', encoding='utf-8-sig', dtype=str)
              merged = pd.concat([old, new], ignore_index=True).drop_duplicates(subset=['race_id', 'horse_number'], keep='last')
              merged.to_csv('keiba_predictor/data/cleaned_races.csv', index=False, encoding='utf-8-sig')
              print(f'マージ完了: 旧{len(old)} + 新{len(new)} → {len(merged)} 行')
              "
              rm keiba_predictor/data/cleaned_races_old.csv
            fi
            # gzip 再生成
            gzip -k -9 -f keiba_predictor/data/cleaned_races.csv
            echo "✅ クリーニング+マージ+圧縮完了"
            echo "DATA_READY=true" >> $GITHUB_ENV
          fi

      # ── 特徴量生成・モデル学習 ──────────────────────────────
      - name: 特徴量エンジニアリング
        if: env.DATA_READY == 'true'
        run: |
          if [ ! -f keiba_predictor/data/cleaned_races.csv ]; then
            echo "⚠️ cleaned_races.csv が見つかりません → スキップ"
          else
            python -m keiba_predictor.main features
            echo "✅ 特徴量生成完了"
          fi

      - name: モデル学習（NAR）
        if: env.DATA_READY == 'true'
        run: |
          if [ ! -f keiba_predictor/data/featured_races.csv ]; then
            echo "⚠️ featured_races.csv が見つかりません → スキップ"
          else
            python -m keiba_predictor.main train
            echo "✅ NAR モデル学習完了"
          fi

      - name: モデルメトリクスを取得
        if: env.DATA_READY == 'true'
        run: |
          python -c "
          import pickle, os, sys
          model_path = 'keiba_predictor/model/xgb_model.pkl'
          try:
              with open(model_path, 'rb') as f:
                  bundle = pickle.load(f)
              auc      = bundle.get('cv_auc_mean',      0.0)
              fukusho  = bundle.get('cv_fukusho_mean',  0.0)
              print(f'AUC: {auc:.4f}  ワイド指標(参考): {fukusho*100:.1f}%')
              with open(os.environ['GITHUB_ENV'], 'a') as env_file:
                  env_file.write(f'MODEL_AUC={auc:.4f}\n')
                  env_file.write(f'MODEL_WIDE={fukusho*100:.1f}\n')
          except Exception as e:
              print(f'メトリクス取得エラー: {e}', file=sys.stderr)
              with open(os.environ['GITHUB_ENV'], 'a') as env_file:
                  env_file.write('MODEL_AUC=N/A\n')
                  env_file.write('MODEL_WIDE=N/A\n')
          "

      # ── モデルをGoogle Driveにアップロード ───────────────────
      - name: モデルをGoogle Driveにアップロード
        if: env.DATA_READY == 'true'
        continue-on-error: true
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          NAR_MODEL_GDRIVE_ID: ${{ secrets.NAR_MODEL_GDRIVE_ID }}
        run: python keiba_predictor/scripts/upload_model.py

      # ── キャッシュをコミット ─────────────────────────────────
      - name: キャッシュをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git config rebase.autoStash true
          git add keiba_predictor/data/predictions_cache.json 2>/dev/null || true
          git add keiba_predictor/data/cleaned_races.csv.gz 2>/dev/null || true
          # 解凍した .csv は除外（.gitignoreで管理）
          rm -f keiba_predictor/data/cleaned_races.csv
          if git diff --staged --quiet; then
            echo "ℹ️ 変更なし"
          else
            git commit -m "chore: NAR水曜データ更新 AUC=${MODEL_AUC} ワイド=${MODEL_WIDE}% [skip ci]"
            git pull --rebase -X theirs origin ${{ github.ref_name }} || true
            git push
            echo "✅ コミット・プッシュ完了"
          fi

      # ── Discord に完了通知 ────────────────────────────────────
      - name: ✅ 完了を Discord に通知
        run: |
          PAYLOAD=$(python3 -c "
          import json
          msg = (
              '\`\`\`\n'
              '✅ KEIBA EDGE NAR データ更新完了\n'
              'AUC: ${MODEL_AUC} / ワイド指標: ${MODEL_WIDE}%\n'
              '📤 Google Drive: ${GDRIVE_UPLOAD:-未実行}\n'
              '次回予想: 明日09時\n'
              '\`\`\`'
          )
          print(json.dumps({'content': msg}))
          ")
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || true

      # ── クレジット残量チェック ─────────────────────────────────
      - name: クレジット残量チェック
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: python -m keiba_predictor.credit_monitor

      # ── セキュリティチェック ──────────────────────────────────
      - name: セキュリティチェック（pip-audit）
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --ignore-vuln GHSA-r9hx-vwmv-q579 || true

      # ── エラー時の Discord 通知 ──────────────────────────────
      - name: ❌ エラーを Discord に通知
        if: failure()
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then exit 0; fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"⚠️ **NAR水曜データ更新が失敗しました**\nログ: ${RUN_URL}\"}" || true
